<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">ParaChrSNP icon</title>
  <desc id="desc">A publication-style icon combining a DNA helix, chromosome-wise segmentation and highlighted SNP loci for the ParaChrSNP workflow.</desc>
  <defs>
    <linearGradient id="bg" x1="160" y1="110" x2="840" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="helixA" x1="300" y1="165" x2="720" y2="860" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0284c7"/>
      <stop offset="1" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="helixB" x1="720" y1="165" x2="300" y2="860" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#16a34a"/>
      <stop offset="1" stop-color="#0284c7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect x="74" y="74" width="876" height="876" rx="190" fill="url(#bg)" stroke="#cbd5e1" stroke-width="22"/>

  <g filter="url(#shadow)">
    <rect x="176" y="166" width="672" height="692" rx="80" fill="#ffffff" stroke="#dbe4ee" stroke-width="8"/>
  </g>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M368 190 C690 312 690 435 368 557 C235 608 235 740 368 834" stroke="url(#helixA)" stroke-width="34"/>
    <path d="M656 190 C334 312 334 435 656 557 C789 608 789 740 656 834" stroke="url(#helixB)" stroke-width="34"/>
  </g>

  <g stroke="#64748b" stroke-width="18" stroke-linecap="round">
    <line x1="385" y1="255" x2="639" y2="255"/>
    <line x1="336" y1="340" x2="688" y2="340"/>
    <line x1="337" y1="450" x2="687" y2="450"/>
    <line x1="385" y1="536" x2="639" y2="536"/>
    <line x1="345" y1="642" x2="679" y2="642"/>
    <line x1="360" y1="748" x2="664" y2="748"/>
  </g>

  <g>
    <circle cx="688" cy="340" r="42" fill="#ffedd5" stroke="#ea580c" stroke-width="12"/>
    <circle cx="337" cy="450" r="42" fill="#fae8ff" stroke="#a21caf" stroke-width="12"/>
    <circle cx="664" cy="748" r="42" fill="#fef9c3" stroke="#ca8a04" stroke-width="12"/>
  </g>

  <g font-family="Arial, Helvetica, sans-serif" font-weight="700" text-anchor="middle">
    <text x="688" y="352" font-size="32" fill="#9a3412">A/T</text>
    <text x="337" y="462" font-size="32" fill="#86198f">C/G</text>
    <text x="664" y="760" font-size="32" fill="#854d0e">G/A</text>
  </g>

  <g>
    <rect x="252" y="862" width="520" height="72" rx="36" fill="#17212b"/>
    <text x="512" y="912" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="700" text-anchor="middle" fill="#ffffff">ParaChrSNP</text>
  </g>
</svg>
